<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VA/US History SOL Review</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .stimulus { background: #f8f9fa; padding: 15px; border-left: 4px solid #002868; margin-bottom: 15px; font-style: italic; }
        .stimulus img { max-width: 100%; border-radius: 5px; }
        button { display: block; width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #ccc; background: white; cursor: pointer; text-align: left; transition: 0.3s; }
        button:hover { background: #e7f3ff; }
        #feedback { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; }
        .correct { background: #d4edda; color: #155724; }
        .incorrect { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="category">Loading...</h2>
    <div id="stimulus-container" class="stimulus"></div>
    <p id="question-text"></p>
    <div id="options-container"></div>
    <div id="feedback"></div>
    <button id="next-btn" style="display:none; background:#002868; color:white; text-align:center;">Next Question</button>
</div>

<script>
    let questions = [];
    let currentIndex = 0;

    // The Fetch Command: Grabbing your JSON data
    fetch('questions.json')
        .then(res => res.json())
        .then(data => {
            questions = data;
            loadQuestion();
        });

    function loadQuestion() {
        const q = questions[currentIndex];
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('category').innerText = `${q.category} (${q.standard})`;
        document.getElementById('question-text').innerText = q.question;

        const stim = document.getElementById('stimulus-container');
        stim.innerHTML = q.stimulus_type === 'image' 
            ? `<img src="${q.image_url}" alt="Historical Stimulus">` 
            : q.stimulus_content;

        const options = document.getElementById('options-container');
        options.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt.charAt(0), q);
            options.appendChild(btn);
        });
    }

    function checkAnswer(choice, q) {
        const feedback = document.getElementById('feedback');
        feedback.style.display = 'block';
        if (choice === q.answer) {
            feedback.className = 'correct';
            feedback.innerHTML = `<strong>Correct!</strong> ${q.explanation}`;
            document.getElementById('next-btn').style.display = 'block';
        } else {
            feedback.className = 'incorrect';
            feedback.innerHTML = `<strong>Not quite.</strong> Review your notes for ${q.standard}.`;
        }
    }

    document.getElementById('next-btn').onclick = () => {
        currentIndex = (currentIndex + 1) % questions.length;
        loadQuestion();
    };
</script>
</body>
</html>
