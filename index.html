<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VUS History: Early North America Review</title>
    <style>
        :root { --primary: #002868; --secondary: #bf0a30; --bg: #f4f4f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .card { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .standard-tag { background: var(--primary); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
        
        .stimulus-box { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; text-align: center; border-radius: 8px; }
        .stimulus-box img { max-width: 100%; height: auto; border-radius: 4px; max-height: 400px; }
        .stimulus-text { font-style: italic; color: #555; font-size: 1.1rem; line-height: 1.5; }
        
        .question-text { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; }
        
        .options-grid { display: grid; gap: 12px; }
        .option-btn { 
            background: white; border: 2px solid #e0e0e0; padding: 15px; text-align: left; 
            border-radius: 8px; cursor: pointer; font-size: 1rem; transition: all 0.2s ease;
        }
        .option-btn:hover { border-color: var(--primary); background: #f0f7ff; }
        .option-btn.correct-choice { background: #d4edda; border-color: #28a745; }
        .option-btn.incorrect-choice { background: #f8d7da; border-color: #dc3545; }

        #feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; line-height: 1.6; }
        .nav-controls { margin-top: 25px; display: flex; justify-content: flex-end; }
        .next-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2 id="category-title" style="margin:0; font-size: 1.2rem;">Practice Quiz</h2>
        <span id="standard-display" class="standard-tag"></span>
    </div>

    <div id="stimulus-area" class="stimulus-box">
        </div>

    <div id="question-body" class="question-text"></div>

    <div id="options-area" class="options-grid"></div>

    <div id="feedback"></div>

    <div class="nav-controls">
        <button id="next-button" class="next-btn">Next Question &rarr;</button>
    </div>
</div>

<script>
    let quizStore = [];
    let currentIdx = 0;

    // 1. Fetching the updated JSON
    fetch('questions.json')
        .then(response => {
            if (!response.ok) throw new Error("Could not find questions.json");
            return response.json();
        })
        .then(data => {
            quizStore = data;
            renderQuestion();
        })
        .catch(err => console.error(err));

    function renderQuestion() {
        const item = quizStore[currentIdx];
        
        // Reset UI
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-button').style.display = 'none';
        
        // Populate Metadata
        document.getElementById('standard-display').innerText = item.standard;
        document.getElementById('category-title').innerText = item.category;
        document.getElementById('question-body').innerText = item.question;

        // Populate Stimulus (Image or Text)
        const stimArea = document.getElementById('stimulus-area');
        if (item.stimulus_type === 'image' && item.image_url) {
            stimArea.innerHTML = `<img src="${item.image_url}" alt="Historical stimulus for question ${item.id}">`;
        } else if (item.stimulus_content) {
            stimArea.innerHTML = `<div class="stimulus-text">"${item.stimulus_content}"</div>`;
        } else {
            stimArea.style.display = 'none'; // Hide if neither exists
        }

        // Populate Options
        const optionsArea = document.getElementById('options-area');
        optionsArea.innerHTML = '';
        item.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleChoice(btn, opt.charAt(0), item);
            optionsArea.appendChild(btn);
        });
    }

    function handleChoice(selectedBtn, letter, item) {
        const feedback = document.getElementById('feedback');
        const allButtons = document.querySelectorAll('.option-btn');
        
        // Disable all buttons after one is clicked
        allButtons.forEach(b => b.style.pointerEvents = 'none');

        if (letter === item.answer) {
            selectedBtn.classList.add('correct-choice');
            feedback.innerHTML = `<strong>Correct!</strong> ${item.explanation}`;
            feedback.style.display = 'block';
            feedback.style.background = '#d4edda';
            feedback.style.color = '#155724';
        } else {
            selectedBtn.classList.add('incorrect-choice');
            feedback.innerHTML = `<strong>Incorrect.</strong> ${item.explanation}`;
            feedback.style.display = 'block';
            feedback.style.background = '#f8d7da';
            feedback.style.color = '#721c24';
        }

        document.getElementById('next-button').style.display = 'block';
    }

    document.getElementById('next-button').onclick = () => {
        currentIdx++;
        if (currentIdx < quizStore.length) {
            renderQuestion();
        } else {
            // End of Quiz
            document.querySelector('.card').innerHTML = `
                <div style="text-align:center; padding: 40px;">
                    <h2 style="color: var(--primary);">Review Complete!</h2>
                    <p>You have finished the Early North America practice set.</p>
                    <button onclick="location.reload()" class="next-btn" style="display:inline-block;">Start Over</button>
                </div>
            `;
        }
    };
</script>

</body>
</html>
